<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azeez Lifting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; }
        input { background: #1c1c1e; border: 1px solid #3a3a3c; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; }
        .card { background: #1c1c1e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
        .badge { background: #3a3a3c; color: #0a84ff; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; margin-right: 8px; vertical-align: middle; }
        button { background: #0a84ff; color: white; padding: 12px; border-radius: 10px; font-weight: bold; width: 85px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <header class="mb-6 mt-4">
        <h1 class="text-3xl font-black text-center">TRAINING</h1>
    </header>

    <div id="workout-list" class="space-y-4 text-center text-gray-600 py-10">
        Loading lifts...
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxWKBB5XWVRfXcliMnuZGaEn3-u-GSgi2BWZNBKx97bKELUCWEaHsgS3wibC_UKxko4/exec";

        async function loadWorkout() {
            const container = document.getElementById('workout-list');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="text-left mb-4">
                            <div class="flex items-center mb-1">
                                <span class="badge">${item.code}</span>
                                <span class="text-blue-400 font-bold text-lg leading-tight">${item.exercise}</span>
                            </div>
                            <div class="text-gray-500 text-xs ml-1">${item.setsReps}</div>
                        </div>
                        <div class="flex items-end gap-3">
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 font-bold">Weight (KG)</label>
                                <input type="text" id="w-${item.row}" value="${item.weight}" placeholder="---">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 font-bold">RPE</label>
                                <input type="text" id="r-${item.row}" value="${item.rpe}" placeholder="---">
                            </div>
                            <button id="btn-${item.row}" onclick="saveRow(${item.row}, ${item.col})">SAVE</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerText = "Error Loading Data";
            }
        }

        async function saveRow(row, col) {
            const weight = document.getElementById(`w-${row}`).value;
            const rpe = document.getElementById(`r-${row}`).value;
            const btn = document.getElementById(`btn-${row}`);
            btn.innerText = "...";
            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ row, col, weight, rpe })
                });
                btn.innerText = "DONE";
                btn.style.background = "#30d158";
                setTimeout(() => { btn.innerText = "SAVE"; btn.style.background = "#0a84ff"; }, 2000);
            } catch (e) {
                btn.innerText = "ERR";
                btn.style.background = "#ff453a";
            }
        }
        loadWorkout();
    </script>
</body>
</html>
