<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azeez Lifting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: -apple-system, sans-serif; }
        input { background: #1e1e1e; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button { background: #007aff; color: white; padding: 12px; border-radius: 8px; font-weight: bold; width: 80px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Workout Tracker</h1>
    <div id="workout-list" class="space-y-4 text-center text-gray-500">Loading your lifts...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxFxMXsoN_MfOSdRMzhpigXjqhg0Hs4VpObhMLiwqHlswBQzHFkZd40Ys65wb4zuMTh/exec";

        async function loadWorkout() {
            const container = document.getElementById('workout-list');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="text-left mb-4">
                            <div class="font-bold text-lg text-blue-300 uppercase tracking-tight">${item.exercise}</div>
                            <div class="text-gray-500 text-sm">${item.setsReps}</div>
                        </div>
                        <div class="flex items-end gap-3">
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-600 uppercase mb-1">Weight</label>
                                <input type="text" id="w-${item.row}" value="${item.weight || ''}" placeholder="0">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-600 uppercase mb-1">RPE</label>
                                <input type="number" step="0.1" id="r-${item.row}" value="${item.rpe || ''}" placeholder="0">
                            </div>
                            <button id="btn-${item.row}" onclick="saveRow(${item.row}, ${item.col})">Save</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerText = "Error loading. Did you authorize the Google Script?";
            }
        }

        async function saveRow(row, col) {
            const weight = document.getElementById(`w-${row}`).value;
            const rpe = document.getElementById(`r-${row}`).value;
            const btn = document.getElementById(`btn-${row}`);
            
            btn.innerText = "...";
            btn.style.background = "#444";

            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ row, col, weight, rpe })
                });
                btn.innerText = "✓";
                btn.style.background = "#28a745";
                setTimeout(() => { btn.innerText = "Save"; btn.style.background = "#007aff"; }, 2000);
            } catch (e) {
                btn.innerText = "Err";
                btn.style.background = "#dc3545";
            }
        }

        loadWorkout();
    </script>
</body>
</html>
