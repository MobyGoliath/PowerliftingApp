<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azeez Lifting Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        input { background: #1c1c1e; border: 1px solid #3a3a3c; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; }
        .card { background: #1c1c1e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
        button { background: #0a84ff; color: white; padding: 12px; border-radius: 10px; font-weight: bold; width: 85px; }
        
        /* Sidebar Styles */
        #sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #1c1c1e; transition: 0.3s; z-index: 100; border-right: 1px solid #3a3a3c; padding: 20px; }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 90; }
        .overlay.active { display: block; }
        .month-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #2c2c2e; font-size: 14px; }
        .month-btn.active { background: #0a84ff; font-weight: bold; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div id="sidebar">
        <h2 class="text-xl font-bold mb-6 text-blue-400">Select Block</h2>
        <div id="month-list" class="space-y-2">Loading blocks...</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <header class="flex justify-between items-center mb-8 mt-4">
        <button onclick="toggleSidebar()" style="width: auto; background: none; font-size: 24px;">☰</button>
        <h1 class="text-2xl font-black tracking-tight uppercase" id="current-title">TRAINING</h1>
        <div style="width: 30px;"></div>
    </header>

    <div id="workout-list" class="space-y-4">
        <div class="text-center text-gray-600 py-20 italic">Select a month from the menu...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxXZ11qE6ItiEQoyUVydFQmZi-kcKpgqLQIrwTcRYjMiZdbkSwWu7ubAsQH5jOfq1d9/exec";
        let currentSheet = "";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function init() {
            // 1. Get list of months
            const response = await fetch(`${API_URL}?getSheets=true`);
            const sheets = await response.json();
            const list = document.getElementById('month-list');
            list.innerHTML = '';
            
            sheets.forEach((name, index) => {
                const btn = document.createElement('button');
                btn.className = `month-btn ${index === sheets.length - 1 ? 'active' : ''}`;
                btn.innerText = name;
                btn.onclick = () => selectMonth(name);
                list.appendChild(btn);
                if (index === sheets.length - 1) currentSheet = name;
            });

            if (currentSheet) selectMonth(currentSheet);
        }

        async function selectMonth(name) {
            currentSheet = name;
            document.getElementById('current-title').innerText = name;
            toggleSidebar();
            
            const container = document.getElementById('workout-list');
            container.innerHTML = '<div class="text-center text-gray-600 py-20 italic">Loading lifts...</div>';

            try {
                const response = await fetch(`${API_URL}?sheet=${encodeURIComponent(name)}`);
                const data = await response.json();
                container.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="text-left mb-4">
                            <div class="text-blue-400 font-bold text-lg leading-tight">${item.exercise}</div>
                            <div class="text-gray-500 text-xs mt-1 font-medium">${item.setsReps}</div>
                        </div>
                        <div class="flex items-end gap-3">
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 font-bold">Weight (KG)</label>
                                <input type="text" id="w-${item.row}" value="${item.weight}" placeholder="...">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 font-bold">RPE</label>
                                <input type="text" id="r-${item.row}" value="${item.rpe}" placeholder="...">
                            </div>
                            <button id="btn-${item.row}" onclick="saveRow(${item.row}, ${item.col})">SAVE</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = '<div class="text-red-500 text-center">Load Error</div>';
            }
        }

        async function saveRow(row, col) {
            const weight = document.getElementById(`w-${row}`).value;
            const rpe = document.getElementById(`r-${row}`).value;
            const btn = document.getElementById(`btn-${row}`);
            btn.innerText = "...";
            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ sheet: currentSheet, row, col, weight, rpe })
                });
                btn.innerText = "DONE";
                btn.style.background = "#30d158";
                setTimeout(() => { btn.innerText = "SAVE"; btn.style.background = "#0a84ff"; }, 2000);
            } catch (e) {
                btn.innerText = "ERR";
                btn.style.background = "#ff453a";
            }
        }

        init();
    </script>
</body>
</html>
