<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azeez Lifting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; }
        input { background: #1c1c1e; border: 1px solid #3a3a3c; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: 500; }
        .card { background: #1c1c1e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
        button { background: #0a84ff; color: white; padding: 12px; border-radius: 10px; font-weight: bold; width: 90px; transition: opacity 0.2s; }
        button:active { opacity: 0.6; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <header class="mb-8 mt-4 text-center">
        <h1 class="text-3xl font-black tracking-tight">TRAINING</h1>
        <p class="text-gray-500 text-sm">Azeez Al-Shaikhli</p>
    </header>

    <div id="workout-list" class="space-y-4">
        <div class="text-center text-gray-600 py-20">Syncing with Google Sheets...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxIbIo1xnuYDWhjwo4a-WRmL__-rRkEBh-2QM2c-26ESvUJ5KsYmAsrR5d37A1oIK28/exec";

        async function loadWorkout() {
            const container = document.getElementById('workout-list');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="mb-4">
                            <div class="text-blue-400 font-bold text-xl leading-tight">${item.exercise}</div>
                            <div class="text-gray-400 text-sm mt-1 uppercase font-semibold tracking-wider">${item.setsReps}</div>
                        </div>
                        <div class="flex items-end gap-3">
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 ml-1 font-bold">Weight (KG/LB)</label>
                                <input type="text" id="w-${item.row}" value="${item.weight}" placeholder="---">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-gray-500 uppercase mb-2 ml-1 font-bold">RPE</label>
                                <input type="number" step="0.5" id="r-${item.row}" value="${item.rpe}" placeholder="---">
                            </div>
                            <button id="btn-${item.row}" onclick="saveRow(${item.row}, ${item.col})" class="shadow-xl">SAVE</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = '<div class="text-red-500 text-center font-bold">CONNECTION ERROR</div>';
            }
        }

        async function saveRow(row, col) {
            const weight = document.getElementById(`w-${row}`).value;
            const rpe = document.getElementById(`r-${row}`).value;
            const btn = document.getElementById(`btn-${row}`);
            
            btn.innerText = "...";
            btn.style.background = "#444";

            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ row, col, weight, rpe })
                });
                btn.innerText = "DONE";
                btn.style.background = "#30d158";
                setTimeout(() => { btn.innerText = "SAVE"; btn.style.background = "#0a84ff"; }, 2000);
            } catch (e) {
                btn.innerText = "ERR";
                btn.style.background = "#ff453a";
            }
        }
        loadWorkout();
    </script>
</body>
</html>
