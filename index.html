<body class="p-4 max-w-md mx-auto">

    <h1 class="text-2xl font-bold mb-6 text-center">Y3M12: Mar 30 Session</h1>

    <div id="workout-list" class="space-y-4">Loading...</div>



    <script>

        const API_URL = "https://script.google.com/macros/s/AKfycbwYhyExJ2ecGb8fPJTMwc_bvp2X1fyVB3JnQUcZEBY8sRaU555xmBgZC09SvAKyEe0/exec";



        async function loadWorkout() {

            const container = document.getElementById('workout-list');

            const response = await fetch(API_URL);

            const data = await response.json();

            container.innerHTML = '';



            data.forEach(item => {

                const div = document.createElement('div');

                div.className = 'card bg-[#1e1e1e] p-5 rounded-xl mb-4 shadow-lg';

                div.innerHTML = `

                    <div class="mb-3">

                        <div class="text-blue-400 font-bold text-lg">${item.exercise}</div>

                        <div class="text-gray-400 text-sm italic">${item.setsReps}</div>

                    </div>

                    <div class="flex items-end gap-3">

                        <div class="flex-1">

                            <label class="block text-[10px] text-gray-500 uppercase mb-1">Weight (KG)</label>

                            <input type="text" id="w-${item.row}" class="w-full bg-[#2a2a2a] p-3 rounded-lg text-white" value="${item.weight || ''}">

                        </div>

                        <div class="flex-1">

                            <label class="block text-[10px] text-gray-500 uppercase mb-1">RPE</label>

                            <input type="number" id="r-${item.row}" class="w-full bg-[#2a2a2a] p-3 rounded-lg text-white" value="${item.rpe || ''}">

                        </div>

                        <button onclick="saveRow(${item.row})" class="bg-blue-600 px-4 py-3 rounded-lg font-bold">Save</button>

                    </div>

                `;

                container.appendChild(div);

            });

        }



        async function saveRow(row) {

            const weight = document.getElementById(`w-${row}`).value;

            const rpe = document.getElementById(`r-${row}`).value;

            const btn = event.target;

            btn.innerText = "...";



            await fetch(API_URL, {

                method: "POST",

                body: JSON.stringify({ row, weight, rpe })

            });



            btn.innerText = "✓";

            btn.className = "bg-green-600 px-4 py-3 rounded-lg font-bold";

            setTimeout(() => { 

                btn.innerText = "Save"; 

                btn.className = "bg-blue-600 px-4 py-3 rounded-lg font-bold";

            }, 2000);

        }



        loadWorkout();

    </script>

</body>
